<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Gallery | Manage Paintings</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        .admin-sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .admin-sidebar a {
            padding: 1rem;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: rgba(255, 255, 255, 0.6);
            color: var(--accent-color);
            transform: translateX(5px);
        }
        .admin-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .admin-table-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
            overflow-x: auto;
            box-shadow: 0 8px 32px rgba(255, 159, 176, 0.1);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            vertical-align: middle;
        }
        .admin-table th {
            font-weight: 600;
            color: var(--accent-color);
        }
        .admin-table tr:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-color);
            margin-right: 0.5rem;
            transition: color 0.3s;
        }
        .action-btn.edit:hover { color: #a2d2ff; }
        .action-btn.delete:hover { color: #ffafcc; }
        .painting-thumb {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-available { background: #bde0fe; color: #023e8a; }
        .status-sold { background: #ffc8dd; color: #800f2f; }
    </style>
</head>
<body>
    <div class="starry-night-bg">
        <div class="swirl swirl-1"></div>
        <div class="swirl swirl-2"></div>
        <div class="swirl swirl-3"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
    </div>

    <main class="admin-layout">
        <aside class="admin-sidebar">
            <div style="margin-bottom: 2rem; text-align: center;">
                <a href="index.html" class="logo" style="justify-content: center; font-size: 1.8rem;">ArtistGallery <i class="fa-solid fa-palette" style="font-size: 0.8em; margin-left: 2px;"></i></a>
            </div>
            <a href="admin-dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="admin-paintings.html" class="active"><i class="fa-solid fa-paint-brush"></i> Manage Paintings</a>
            <a href="admin-users.html"><i class="fa-solid fa-users"></i> Manage Users</a>
            <a href="admin-orders.html"><i class="fa-solid fa-receipt"></i> Orders & Sales</a>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.2);">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Shop</a>
                <a href="login.html" style="color: #ffafcc;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <section class="admin-content container">
            <div class="admin-header">
                <h1>Manage Paintings</h1>
                <button class="btn"><i class="fa-solid fa-plus"></i> Add New Painting</button>
            </div>
            
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Art Title</th>
                            <th>Price</th>
                            <th>Likes ❤️</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=200" alt="Art" class="painting-thumb"></td>
                            <td><strong>Starry Blossoms</strong></td>
                            <td>$450.00</td>
                            <td>342</td>
                            <td><span class="status-badge status-sold">Sold</span></td>
                            <td>
                                <button class="action-btn edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td><img src="https://images.unsplash.com/photo-1544413660-f13d80ee625b?auto=format&fit=crop&q=80&w=200" alt="Art" class="painting-thumb"></td>
                            <td><strong>Pastel Dreams</strong></td>
                            <td>$320.00</td>
                            <td>128</td>
                            <td><span class="status-badge status-available">Available</span></td>
                            <td>
                                <button class="action-btn edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td><img src="https://images.unsplash.com/photo-1580136608260-4eb11f4b24fe?auto=format&fit=crop&q=80&w=200" alt="Art" class="painting-thumb"></td>
                            <td><strong>Moonlight Whispers</strong></td>
                            <td>$500.00</td>
                            <td>512</td>
                            <td><span class="status-badge status-available">Available</span></td>
                            <td>
                                <button class="action-btn edit" title="Edit"><i class="fa-solid fa-pen"></i></button>
                                <button class="action-btn delete" title="Delete"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
