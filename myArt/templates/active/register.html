{% extends '_base.html' %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Register | Artist Gallery{% endblock %}</title>
</head>
<body>
     {% block content %}
    <!-- Main Content -->
    <main class="section container text-center">
        <div class="auth-container fade-in-up">
            <h1 class="section-title" style="margin-bottom: 2rem;">Join the Club ✨</h1>
            
            <div class="auth-card">
                <form action="profile.html" method="GET">
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Anna Marie" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="hello@example.com" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 2.5rem;">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                    
                    <p style="margin-top: 1.5rem; color: var(--text-muted);">
                        Already have an account? <a href="login.html" style="color: var(--accent-color); font-weight: bold;">Log In</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    {% endblock %}

</body>
</html>
