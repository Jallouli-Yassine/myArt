<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Gallery | Add New Painting</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        .admin-sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .admin-sidebar a {
            padding: 1rem;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: rgba(255, 255, 255, 0.6);
            color: var(--accent-color);
            transform: translateX(5px);
        }
        .admin-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .admin-form-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(255, 159, 176, 0.1);
            max-width: 800px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-color);
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            background: white;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        .form-row {
            display: flex;
            gap: 1.5rem;
        }
        .form-row .form-group {
            flex: 1;
        }
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
            color: var(--text-color);
            margin-bottom: 1rem;
            overflow: hidden;
            position: relative;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            display: none;
        }
        .image-preview.has-image img {
            display: block;
        }
        .image-preview.has-image span {
            display: none;
        }
        .file-input {
            width: 100%;
            padding: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="starry-night-bg">
        <div class="swirl swirl-1"></div>
        <div class="swirl swirl-2"></div>
        <div class="swirl swirl-3"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
        <div class="floating-heart"><i class="fa-solid fa-heart"></i></div>
    </div>

    <main class="admin-layout">
        <aside class="admin-sidebar">
            <div style="margin-bottom: 2rem; text-align: center;">
                <a href="index.html" class="logo" style="justify-content: center; font-size: 1.8rem;">ArtistGallery <i class="fa-solid fa-palette" style="font-size: 0.8em; margin-left: 2px;"></i></a>
            </div>
            <a href="admin-dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="admin-paintings.html" class="active"><i class="fa-solid fa-paint-brush"></i> Manage Paintings</a>
            <a href="admin-users.html"><i class="fa-solid fa-users"></i> Manage Users</a>
            <a href="admin-orders.html"><i class="fa-solid fa-receipt"></i> Orders & Sales</a>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.2);">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Shop</a>
                <a href="login.html" style="color: #ffafcc;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <section class="admin-content container">
            <div class="admin-header">
                <h1>Add New Painting</h1>
                <a href="admin-paintings.html" class="btn" style="background: rgba(255,255,255,0.5); color: var(--text-color);"><i class="fa-solid fa-arrow-left"></i> Cancel</a>
            </div>
            
            <div class="admin-form-container">
                <form id="add-painting-form" action="admin-paintings.html">
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="painting-title">Painting Title</label>
                            <input type="text" id="painting-title" class="form-control" placeholder="Enter painting title" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="painting-price">Price ($)</label>
                            <input type="number" id="painting-price" class="form-control" placeholder="0.00" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="painting-description">Description</label>
                        <textarea id="painting-description" class="form-control" placeholder="Describe the painting..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="painting-category">Category / Medium</label>
                            <select id="painting-category" class="form-control">
                                <option value="oil">Oil on Canvas</option>
                                <option value="watercolor">Watercolor</option>
                                <option value="acrylic">Acrylic</option>
                                <option value="digital">Digital Art</option>
                                <option value="mixed">Mixed Media</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="painting-status">Status</label>
                            <select id="painting-status" class="form-control">
                                <option value="available">Available</option>
                                <option value="sold">Sold</option>
                                <option value="reserved">Reserved</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Image Upload</label>
                        <div class="image-preview" id="image-preview">
                            <span><i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; margin-bottom: 10px; display: block; text-align: center;"></i> Preview</span>
                            <img src="" alt="Image Preview" id="preview-img">
                        </div>
                        <input type="file" id="painting-image" class="file-input" accept="image/*" onchange="previewImage(event)">
                    </div>

                    <div class="form-group" style="margin-top: 2rem; text-align: right;">
                        <button type="submit" class="btn"><i class="fa-solid fa-save"></i> Save Painting</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
    <script>
        function previewImage(event) {
            const previewContainer = document.getElementById('image-preview');
            const previewImg = document.getElementById('preview-img');
            const file = event.target.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewContainer.classList.add('has-image');
                }
                reader.readAsDataURL(file);
            } else {
                previewImg.src = "";
                previewContainer.classList.remove('has-image');
            }
        }
    </script>
</body>
</html>
